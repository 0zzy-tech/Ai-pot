# ─────────────────────────────────────────────────────────────────────────────
# Multi-architecture Docker build and push
#
# Triggers:
#   • Push to main/master  →  build + push :latest + :<sha>
#   • Version tag (v*.*.*)  →  build + push :<tag>
#   • Pull request          →  build only (no push)
#
# Architectures:
#   linux/amd64   — x86-64 servers, desktops
#   linux/arm64   — Raspberry Pi 4/5 (64-bit OS), Apple Silicon, AWS Graviton
#   linux/arm/v7  — Raspberry Pi 2/3 (32-bit Raspberry Pi OS)
#
# Registry: GitHub Container Registry (ghcr.io)
# Image:    ghcr.io/0zzy-tech/ai-pot
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: 0zzy-tech/ai-pot

jobs:
  build-and-push:
    name: Build (${{ matrix.platform }}) & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU — enables emulation of arm64 / arm/v7 on amd64 runners ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      # ── 3. Buildx — multi-platform build driver ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      # ── 4. Login to GHCR (skip on PRs) ───────────────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry:  ${{ env.REGISTRY }}
          username:  ${{ github.actor }}
          password:  ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata for tags / labels ────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on push to default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # :<sha> on every push
            type=sha,format=short
            # :<tag> on version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=AI Honeypot
            org.opencontainers.image.description=Multi-platform AI API honeypot with live dashboard
            org.opencontainers.image.vendor=0zzy-tech

      # ── 6. Build (and push if not a PR) ──────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push:      ${{ github.event_name != 'pull_request' }}
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          # Layer cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false   # Keeps manifest list clean (no unknown/unknown)

      # ── 7. Inspect the final manifest ────────────────────────────────────
      - name: Inspect image manifest
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
